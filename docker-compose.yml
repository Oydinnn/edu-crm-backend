version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edu_crm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: edu_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: edu_crm_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: edu_crm_backend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: